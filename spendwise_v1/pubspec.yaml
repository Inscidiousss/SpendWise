name: expense_tracker
description: A full-featured daily expense tracking app with AI savings advice.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Export
  pdf: ^3.10.8
  csv: ^6.0.0
  path_provider: ^2.1.2
  share_plus: ^9.0.0

  # UI & UX
  flutter_slidable: ^3.1.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  gap: ^3.0.1
  fl_toast: ^3.2.0

  # Notifications / Alerts
  flutter_local_notifications: ^17.2.2

  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
uuid: ^4.3.3